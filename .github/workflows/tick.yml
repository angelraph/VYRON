name: Execution engine tick

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/cron/tick
        run: |
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            https://vyron.click/api/cron/tick
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
